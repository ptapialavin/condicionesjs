<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3</title>
</head>
<body>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card-password {
            background-color: white;
            border: 1px solid #333;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 25px;
            color: #111;
        }

        .select-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        select {
            font-size: 1.2rem;
            padding: 8px 12px;
            border: 1px solid #767676;
            border-radius: 4px;
            background-color: #f0f0f0;
            cursor: pointer;
        }

        .btn-ingresar {
            font-size: 1.1rem;
            padding: 6px 18px;
            background-color: #e1e1e1;
            border: 1px solid #767676;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-ingresar:hover {
            background-color: #d4d4d4;
        }

        .mensaje-resultado {
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: 500;
            min-height: 24px;
            color: #222;
        }
    </style>
